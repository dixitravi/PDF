<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download PDF</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 80px;
      background: #f7f7f7;
    }

    .download-box {
      background: #fff;
      padding: 30px 40px;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 20px;
    }

    a.download-btn {
      display: inline-block;
      padding: 12px 20px;
      background: #007bff;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      transition: 0.3s;
      font-size: 16px;
    }

    a.download-btn:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

  <div class="download-box">
    <h2>Download PDF File</h2>
    <p>Click the button below to download the PDF.</p>

    <!-- Correct RAW GitHub link -->
    <a class="download-btn"
       href="#">
      Download PDF
    </a>
  </div>

</body>
</html>
